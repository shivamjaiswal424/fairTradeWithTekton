apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: default
data:
  prometheus.yml: |
    global:
      scrape_interval: 10s  # Interval between scrapes

    scrape_configs:
      - job_name: 'prometheus'
        static_configs:
          - targets: ['localhost:9090']  # Prometheus instance

      - job_name: 'django-app'
        static_configs:
          - targets: ['django:8000']  # Django service

      - job_name: 'flask-ml-app'
        static_configs:
          - targets: ['flask-ml:5000']  # Flask-ML service
